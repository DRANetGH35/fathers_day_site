{% from "bootstrap5/form.html" import render_form %}
{% extends "base.html" %} {% block content %}

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confetti on Page Load</title>

</head>
<body style="display:flex; align-items:center; flex-direction:column;">

    <h1>Happy fathers day gamer</h1>
    <img src="static/dad.png" style="height: 80vh;">
    <h3>epic dad moment</h3>
    <!-- 1. Load the canvas-confetti library from CDN -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.4/dist/confetti.browser.min.js"></script>

    <!-- 2. Trigger the confetti right after the DOM loads -->
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            // Standard burst
            confetti({
                particleCount: 150,
                spread: 80,
                origin: { y: 0.6 }
            });
        });
    </script>

</body>
